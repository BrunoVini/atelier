# atelier design QA gate — copy to <repo>/.github/workflows/atelier.yml
# Requires design/design-tokens.json (run atelier's generate-design-md first)
# and the atelier scripts available (vendored, submodule, or pip path).
name: atelier design check
on:
  push:
    branches: [main]
  pull_request:

jobs:
  design-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Adjust ATELIER to where the atelier skill scripts live in your setup.
      - name: atelier check (drift lint + contrast audit)
        env:
          ATELIER: ${{ github.workspace }}/.atelier/scripts
        run: |
          python3 "$ATELIER/check.py" .
      - name: atelier prose gate (AI-tell vocabulary in docs/copy)
        env:
          ATELIER: ${{ github.workspace }}/.atelier/scripts
        run: |
          shopt -s globstar nullglob
          python3 "$ATELIER/prose_check.py" README.md docs/**/*.md || exit 1   # adjust globs

  # Optional: render-capable gate — catches the defect class the static check can't
  # (rendered collisions, overflow, illegible charts). Point PAGES at your built HTML.
  design-render-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install a headless browser
        run: |
          npm i --no-save playwright          # the .mjs checks `import('playwright')` — binaries alone aren't enough
          npx playwright install --with-deps chromium
      - name: atelier render gate (responsive sweep + chart legibility)
        env:
          ATELIER: ${{ github.workspace }}/.atelier/scripts
          PAGES: "dist/**/*.html"   # adjust to your build output
        run: |
          shopt -s globstar nullglob
          fail=0
          for page in $PAGES; do
            rc=0; python3 "$ATELIER/qa.py" "$page" --hook || rc=$?   # 0 clean, 1 defect, 3 no browser
            if [ "$rc" -eq 1 ]; then echo "::error file=$page::atelier render gate: layout defect"; fail=1
            elif [ "$rc" -eq 3 ]; then echo "::error::atelier render gate misconfigured: no headless browser"; fail=1
            fi
          done
          exit $fail

  # Optional: emit SARIF and surface findings in the GitHub Security tab (code
  # scanning) while STILL failing the build on a gate failure. Needs
  # `security-events: write`. Equivalent to the reusable `BrunoVini/atelier` action.
  design-check-sarif:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: atelier check (write SARIF, capture rc)
        id: gate
        env:
          ATELIER: ${{ github.workspace }}/.atelier/scripts
        run: |
          rc=0
          python3 "$ATELIER/check.py" . --sarif atelier.sarif || rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
      - name: Upload SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: atelier.sarif
      - name: Fail on gate failure
        if: always()
        run: |
          [ "${{ steps.gate.outputs.rc }}" = "0" ] || exit "${{ steps.gate.outputs.rc }}"
